services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-school_db}
      POSTGRES_USER: ${DB_USER:-school_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-school_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-school_user} -d ${DB_NAME:-school_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-school_db}
      DB_USER: ${DB_USER:-school_user}
      DB_PASSWORD: ${DB_PASSWORD:-school_pass}
      DB_HOST: db
      DB_PORT: "5432"
      DJANGO_DEBUG: False
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
    volumes:
      - ./src:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./school-management-client:/app
    ports:
      - "8080:8080"
    command: >
      sh -c "npm install &&
             npm run serve -- --host 0.0.0.0 --port 8080"

  docs:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "9999:9999"
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             mkdocs serve -a 0.0.0.0:9999"

volumes:
  postgres_data:
