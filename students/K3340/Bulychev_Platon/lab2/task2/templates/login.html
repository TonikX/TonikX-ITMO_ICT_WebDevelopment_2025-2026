{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<h1>Login</h1>
<div class="card">
    <form method="post">
        {% csrf_token %}
        {{form.as_p}}
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p style="margin-top: 12px; font-size: 14px;">No account? <a href="{% url 'register' %}">Register</a></p>
</div>
{% endblock %}
