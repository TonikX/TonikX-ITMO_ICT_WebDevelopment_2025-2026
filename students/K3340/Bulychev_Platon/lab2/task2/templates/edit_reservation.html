{% extends "base.html" %}
{% block title %}Edit Reservation{% endblock %}
{% block content %}
<h1>Edit Reservation</h1>
<div class="card">
    <form method="post">
        {% csrf_token %}
        <p><label>Tour
        <select name="tour">
            {% for tour in tours %}
            <option value="{{tour.pk}}" {% if tour.pk == reservation.tour.pk %}selected{% endif %}>{{tour.name}}</option>
            {% endfor %}
        </select>
        </label></p>
        <button type="submit" class="btn btn-primary">Save</button>
    </form>
</div>
{% endblock %}
