<!DOCTYPE html>
<html>
    <head>
        <title>Информация об автомобиле</title>
    </head>
    <body>
        <h1>Детальная информация об автомобиле</h1>

        <p><strong>Номер:</strong> {{ car.license_plate }}</p>
        <p><strong>Марка:</strong> {{ car.brand }}</p>
        <p><strong>Модель:</strong> {{ car.model }}</p>
        <p><strong>Цвет:</strong> {{ car.color|default:"Не указан" }}</p>

        <br />
        <a href="{% url 'car_update' car.id %}">Редактировать</a> |
        <a href="{% url 'car_list' %}">Назад к списку</a>
    </body>
</html>
