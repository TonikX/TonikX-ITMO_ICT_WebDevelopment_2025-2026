<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система управления гостиницей</title>

    <!-- Vuetify через CDN -->
    <link href="https://cdn.jsdelivr.net/npm/vuetify@2.6.14/dist/vuetify.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@6.x/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900" rel="stylesheet">

    <!-- Vue.js, Vuetify и Axios -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@2.6.14/dist/vuetify.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }
        .auth-card {
            max-width: 400px;
            margin: 50px auto;
        }
        .page-content {
            padding: 20px;
        }
        .stat-card {
            border-radius: 10px;
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .error-message {
            color: #f44336;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            background-color: #ffebee;
        }
        .success-message {
            color: #4caf50;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            background-color: #e8f5e9;
        }
        .clickable-row {
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .clickable-row:hover {
            background-color: #f5f5f5;
        }
        .analytics-card {
            height: 100%;
            transition: all 0.3s;
        }
        .analytics-card:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Загрузочный экран -->
        <div v-if="loading" class="loading-overlay">
            <div style="text-align: center;">
                <v-progress-circular
                    indeterminate
                    color="primary"
                    size="64"
                ></v-progress-circular>
                <p style="margin-top: 20px;">Загрузка приложения...</p>
            </div>
        </div>

        <!-- Основное приложение -->
        <template v-if="!loading">
            <v-app>
                <!-- Навигационная панель -->
                <v-navigation-drawer
                    v-model="drawer"
                    app
                    clipped
                    v-if="isAuthenticated"
                >
                    <v-list dense>
                        <v-list-item @click="currentView = 'dashboard'">
                            <v-list-item-icon>
                                <v-icon>mdi-view-dashboard</v-icon>
                            </v-list-item-icon>
                            <v-list-item-title>Панель управления</v-list-item-title>
                        </v-list-item>

                        <v-list-group prepend-icon="mdi-bed">
                            <template v-slot:activator>
                                <v-list-item-title>Номера</v-list-item-title>
                            </template>
                            <v-list-item @click="currentView = 'rooms'">
                                <v-list-item-title>Все номера</v-list-item-title>
                            </v-list-item>
                            <v-list-item @click="currentView = 'roomTypes'">
                                <v-list-item-title>Типы номеров</v-list-item-title>
                            </v-list-item>
                        </v-list-group>

                        <v-list-item @click="currentView = 'clients'">
                            <v-list-item-icon>
                                <v-icon>mdi-account-group</v-icon>
                            </v-list-item-icon>
                            <v-list-item-title>Клиенты</v-list-item-title>
                        </v-list-item>

                        <v-list-group prepend-icon="mdi-account-tie">
                            <template v-slot:activator>
                                <v-list-item-title>Сотрудники</v-list-item-title>
                            </template>
                            <v-list-item @click="currentView = 'staff'">
                                <v-list-item-title>Все сотрудники</v-list-item-title>
                            </v-list-item>
                        </v-list-group>

                        <v-list-group prepend-icon="mdi-room-service">
                            <template v-slot:activator>
                                <v-list-item-title>Услуги</v-list-item-title>
                            </template>
                            <v-list-item @click="currentView = 'hotelServices'">
                                <v-list-item-title>Все услуги</v-list-item-title>
                            </v-list-item>
                        </v-list-group>

                        <v-list-item @click="currentView = 'stays'">
                            <v-list-item-icon>
                                <v-icon>mdi-calendar-check</v-icon>
                            </v-list-item-icon>
                            <v-list-item-title>Проживания</v-list-item-title>
                        </v-list-item>

                        <v-list-group prepend-icon="mdi-chart-bar">
                            <template v-slot:activator>
                                <v-list-item-title>Аналитика</v-list-item-title>
                            </template>
                            <v-list-item @click="currentView = 'analytics'">
                                <v-list-item-title>Аналитические запросы</v-list-item-title>
                            </v-list-item>
                            <v-list-item @click="currentView = 'quarterlyReport'">
                                <v-list-item-title>Квартальный отчет</v-list-item-title>
                            </v-list-item>
                        </v-list-group>

                        <v-list-item @click="currentView = 'profile'">
                            <v-list-item-icon>
                                <v-icon>mdi-account-cog</v-icon>
                            </v-list-item-icon>
                            <v-list-item-title>Профиль</v-list-item-title>
                        </v-list-item>
                    </v-list>
                </v-navigation-drawer>

                <!-- Шапка -->
                <v-app-bar app clipped-left color="primary" dark>
                    <v-app-bar-nav-icon
                        @click.stop="drawer = !drawer"
                        v-if="isAuthenticated"
                    ></v-app-bar-nav-icon>
                    <v-toolbar-title>
                        <v-icon left>mdi-hotel</v-icon>
                        Система управления гостиницей
                    </v-toolbar-title>
                    <v-spacer></v-spacer>
                    <div v-if="isAuthenticated">
                        <span class="mr-3">Привет, [[ user.email ]]</span>
                        <v-btn color="error" @click="logout" small>
                            <v-icon left small>mdi-logout</v-icon>
                            Выйти
                        </v-btn>
                    </div>
                    <div v-else>
                        <v-btn color="success" @click="currentView = 'login'" small>
                            <v-icon left small>mdi-login</v-icon>
                            Войти
                        </v-btn>
                        <v-btn color="info" @click="currentView = 'register'" small class="ml-2">
                            <v-icon left small>mdi-account-plus</v-icon>
                            Регистрация
                        </v-btn>
                    </div>
                </v-app-bar>

                <!-- Основной контент -->
                <v-main>
                    <v-container fluid class="page-content">

                        <!-- ========== КОМПОНЕНТ ВХОДА ========== -->
                        <div v-if="!isAuthenticated && currentView === 'login'">
                            <v-card class="auth-card">
                                <v-card-title class="headline grey lighten-2">
                                    <v-icon left>mdi-login</v-icon>
                                    Вход в систему
                                </v-card-title>
                                <v-card-text>
                                    <v-form v-model="loginForm.valid" @submit.prevent="login">
                                        <v-text-field
                                            v-model="loginForm.email"
                                            label="Email"
                                            type="email"
                                            :rules="emailRules"
                                            required
                                            outlined
                                            prepend-icon="mdi-email"
                                        ></v-text-field>
                                        <v-text-field
                                            v-model="loginForm.password"
                                            label="Пароль"
                                            type="password"
                                            :rules="passwordRules"
                                            required
                                            outlined
                                            prepend-icon="mdi-lock"
                                        ></v-text-field>
                                        <div v-if="loginForm.error" class="error-message">
                                            <v-icon small left>mdi-alert</v-icon>
                                            [[ loginForm.error ]]
                                        </div>
                                        <v-btn
                                            type="submit"
                                            color="primary"
                                            :disabled="!loginForm.valid"
                                            :loading="loginForm.loading"
                                            block
                                            large
                                        >
                                            <v-icon left>mdi-login</v-icon>
                                            Войти
                                        </v-btn>
                                        <v-btn
                                            text
                                            @click="currentView = 'register'"
                                            block
                                            class="mt-2"
                                        >
                                            Нет аккаунта? Зарегистрируйтесь
                                        </v-btn>
                                    </v-form>
                                </v-card-text>
                            </v-card>
                        </div>

                        <!-- ========== КОМПОНЕНТ РЕГИСТРАЦИИ ========== -->
                        <div v-if="!isAuthenticated && currentView === 'register'">
                            <v-card class="auth-card">
                                <v-card-title class="headline grey lighten-2">
                                    <v-icon left>mdi-account-plus</v-icon>
                                    Регистрация
                                </v-card-title>
                                <v-card-text>
                                    <v-form v-model="registerForm.valid" @submit.prevent="register">
                                        <v-text-field
                                            v-model="registerForm.email"
                                            label="Email"
                                            type="email"
                                            :rules="emailRules"
                                            required
                                            outlined
                                            prepend-icon="mdi-email"
                                        ></v-text-field>
                                        <v-text-field
                                            v-model="registerForm.username"
                                            label="Имя пользователя"
                                            :rules="usernameRules"
                                            required
                                            outlined
                                            prepend-icon="mdi-account"
                                        ></v-text-field>
                                        <v-text-field
                                            v-model="registerForm.password"
                                            label="Пароль"
                                            type="password"
                                            :rules="passwordRules"
                                            required
                                            outlined
                                            prepend-icon="mdi-lock"
                                        ></v-text-field>
                                        <v-text-field
                                            v-model="registerForm.passwordConfirm"
                                            label="Подтверждение пароля"
                                            type="password"
                                            :rules="[v => v === registerForm.password || 'Пароли не совпадают']"
                                            required
                                            outlined
                                            prepend-icon="mdi-lock-check"
                                        ></v-text-field>
                                        <div v-if="registerForm.error" class="error-message">
                                            <v-icon small left>mdi-alert</v-icon>
                                            [[ registerForm.error ]]
                                        </div>
                                        <v-btn
                                            type="submit"
                                            color="primary"
                                            :disabled="!registerForm.valid"
                                            :loading="registerForm.loading"
                                            block
                                            large
                                        >
                                            <v-icon left>mdi-account-plus</v-icon>
                                            Зарегистрироваться
                                        </v-btn>
                                    </v-form>
                                </v-card-text>
                            </v-card>
                        </div>

                        <!-- ========== ПАНЕЛЬ УПРАВЛЕНИЯ ========== -->
                        <div v-if="isAuthenticated && currentView === 'dashboard'">
                            <h1 class="display-1 mb-6">Панель управления</h1>

                            <!-- Статистика -->
                            <v-row>
                                <v-col cols="12" md="3" v-for="(stat, index) in dashboardStats" :key="index">
                                    <v-card class="stat-card" :color="stat.color" dark>
                                        <v-card-title class="subtitle-1">[[ stat.title ]]</v-card-title>
                                        <v-card-text class="display-1 text-center">[[ stat.value ]]</v-card-text>
                                        <v-card-actions>
                                            <v-icon>[[ stat.icon ]]</v-icon>
                                            <v-spacer></v-spacer>
                                            <small>[[ stat.description ]]</small>
                                        </v-card-actions>
                                    </v-card>
                                </v-col>
                            </v-row>

                            <!-- Быстрые действия -->
                            <v-row class="mt-6">
                                <v-col cols="12">
                                    <v-card>
                                        <v-card-title>Быстрые действия</v-card-title>
                                        <v-card-text>
                                            <v-btn color="primary" @click="currentView = 'clients'; showClientDialog = true" class="mr-2 mb-2">
                                                <v-icon left>mdi-account-plus</v-icon>
                                                Добавить клиента
                                            </v-btn>
                                            <v-btn color="success" @click="currentView = 'rooms'; showRoomDialog = true" class="mr-2 mb-2">
                                                <v-icon left>mdi-bed-plus</v-icon>
                                                Добавить номер
                                            </v-btn>
                                            <v-btn color="info" @click="currentView = 'stays'; showStayDialog = true" class="mr-2 mb-2">
                                                <v-icon left>mdi-calendar-plus</v-icon>
                                                Заселить клиента
                                            </v-btn>
                                            <v-btn color="warning" @click="currentView = 'staff'; showStaffDialog = true" class="mr-2 mb-2">
                                                <v-icon left>mdi-account-plus</v-icon>
                                                Добавить сотрудника
                                            </v-btn>
                                            <v-btn color="deep-purple" @click="currentView = 'analytics'" class="mr-2 mb-2">
                                                <v-icon left>mdi-chart-bar</v-icon>
                                                Аналитика
                                            </v-btn>
                                        </v-card-text>
                                    </v-card>
                                </v-col>
                            </v-row>

                            <!-- Последние активности -->
                            <v-row class="mt-4">
                                <v-col cols="12" md="6">
                                    <v-card>
                                        <v-card-title>
                                            <v-icon left>mdi-clock-outline</v-icon>
                                            Последние клиенты
                                        </v-card-title>
                                        <v-card-text>
                                            <v-list dense v-if="recentClients.length > 0">
                                                <v-list-item v-for="client in recentClients" :key="client.id">
                                                    <v-list-item-content>
                                                        <v-list-item-title>[[ client.last_name ]] [[ client.first_name ]]</v-list-item-title>
                                                        <v-list-item-subtitle>[[ client.city ]] • [[ formatDate(client.check_in_date) ]]</v-list-item-subtitle>
                                                    </v-list-item-content>
                                                </v-list-item>
                                            </v-list>
                                            <p v-else class="text-center grey--text">Нет данных</p>
                                        </v-card-text>
                                    </v-card>
                                </v-col>
                                <v-col cols="12" md="6">
                                    <v-card>
                                        <v-card-title>
                                            <v-icon left>mdi-bell-outline</v-icon>
                                            Свободные номера
                                        </v-card-title>
                                        <v-card-text>
                                            <v-chip-group>
                                                <v-chip v-for="room in availableRoomsList" :key="room.id" color="green" dark small>
                                                    [[ room.room_number ]]
                                                </v-chip>
                                            </v-chip-group>
                                            <p v-if="availableRoomsList.length === 0" class="text-center grey--text mt-4">Нет свободных номеров</p>
                                        </v-card-text>
                                    </v-card>
                                </v-col>
                            </v-row>
                        </div>

                        <!-- ========== ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ ========== -->
                        <div v-if="isAuthenticated && currentView === 'profile'">
                            <v-card>
                                <v-card-title>
                                    <v-icon left>mdi-account-cog</v-icon>
                                    Профиль пользователя
                                </v-card-title>
                                <v-card-text>
                                    <v-form v-model="profileForm.valid" @submit.prevent="updateProfile">
                                        <v-text-field
                                            v-model="user.email"
                                            label="Email"
                                            readonly
                                            outlined
                                            prepend-icon="mdi-email"
                                        ></v-text-field>

                                        <v-text-field
                                            v-model="profileForm.username"
                                            label="Имя пользователя"
                                            :rules="usernameRules"
                                            outlined
                                            prepend-icon="mdi-account"
                                        ></v-text-field>

                                        <v-text-field
                                            v-model="profileForm.currentPassword"
                                            label="Текущий пароль"
                                            type="password"
                                            outlined
                                            prepend-icon="mdi-lock"
                                        ></v-text-field>

                                        <v-text-field
                                            v-model="profileForm.newPassword"
                                            label="Новый пароль"
                                            type="password"
                                            outlined
                                            prepend-icon="mdi-lock-plus"
                                        ></v-text-field>

                                        <v-text-field
                                            v-model="profileForm.confirmPassword"
                                            label="Подтверждение пароля"
                                            type="password"
                                            outlined
                                            prepend-icon="mdi-lock-check"
                                        ></v-text-field>

                                        <div v-if="profileForm.error" class="error-message">
                                            <v-icon small left>mdi-alert</v-icon>
                                            [[ profileForm.error ]]
                                        </div>

                                        <div v-if="profileForm.success" class="success-message">
                                            <v-icon small left>mdi-check</v-icon>
                                            [[ profileForm.success ]]
                                        </div>

                                        <v-btn
                                            type="submit"
                                            color="primary"
                                            :loading="profileForm.loading"
                                            :disabled="!profileForm.valid"
                                        >
                                            <v-icon left>mdi-content-save</v-icon>
                                            Сохранить изменения
                                        </v-btn>
                                    </v-form>
                                </v-card-text>
                            </v-card>
                        </div>

                        <!-- ========== НОМЕРА (CRUD) ========== -->
                        <div v-if="isAuthenticated && currentView === 'rooms'">
                            <v-card>
                                <v-card-title>
                                    <v-icon left>mdi-bed</v-icon>
                                    Управление номерами
                                    <v-spacer></v-spacer>
                                    <v-text-field
                                        v-model="rooms.search"
                                        append-icon="mdi-magnify"
                                        label="Поиск номеров..."
                                        single-line
                                        hide-details
                                        outlined
                                        dense
                                        class="mr-4"
                                    ></v-text-field>
                                    <v-btn color="primary" @click="openRoomDialog()">
                                        <v-icon left>mdi-plus</v-icon>
                                        Добавить номер
                                    </v-btn>
                                </v-card-title>

                                <v-data-table
                                    :headers="rooms.headers"
                                    :items="rooms.items"
                                    :search="rooms.search"
                                    :loading="rooms.loading"
                                    class="elevation-1"
                                >
                                    <template v-slot:item.is_available="{ item }">
                                        <v-chip :color="item.is_available ? 'success' : 'error'" dark small>
                                            [[ item.is_available ? 'Свободен' : 'Занят' ]]
                                        </v-chip>
                                    </template>

                                    <template v-slot:item.has_phone="{ item }">
                                        <v-icon :color="item.has_phone ? 'green' : 'red'">
                                            [[ item.has_phone ? 'mdi-phone' : 'mdi-phone-off' ]]
                                        </v-icon>
                                    </template>

                                    <template v-slot:item.actions="{ item }">
                                        <v-tooltip bottom>
                                            <template v-slot:activator="{ on }">
                                                <v-btn icon small @click="editRoom(item)" v-on="on" color="primary">
                                                    <v-icon small>mdi-pencil</v-icon>
                                                </v-btn>
                                            </template>
                                            <span>Редактировать</span>
                                        </v-tooltip>

                                        <v-tooltip bottom>
                                            <template v-slot:activator="{ on }">
                                                <v-btn icon small @click="deleteRoom(item)" v-on="on" color="error">
                                                    <v-icon small>mdi-delete</v-icon>
                                                </v-btn>
                                            </template>
                                            <span>Удалить</span>
                                        </v-tooltip>
                                    </template>
                                </v-data-table>
                            </v-card>
                        </div>

                        <!-- ========== КЛИЕНТЫ (CRUD) ========== -->
                        <div v-if="isAuthenticated && currentView === 'clients'">
                            <v-card>
                                <v-card-title>
                                    <v-icon left>mdi-account-group</v-icon>
                                    Управление клиентами
                                    <v-spacer></v-spacer>
                                    <v-text-field
                                        v-model="clients.search"
                                        append-icon="mdi-magnify"
                                        label="Поиск клиентов..."
                                        single-line
                                        hide-details
                                        outlined
                                        dense
                                        class="mr-4"
                                    ></v-text-field>
                                    <v-btn color="primary" @click="openClientDialog()">
                                        <v-icon left>mdi-plus</v-icon>
                                        Добавить клиента
                                    </v-btn>
                                </v-card-title>

                                <v-data-table
                                    :headers="clients.headers"
                                    :items="clients.items"
                                    :search="clients.search"
                                    :loading="clients.loading"
                                    class="elevation-1"
                                >
                                    <template v-slot:item.actions="{ item }">
                                        <v-tooltip bottom>
                                            <template v-slot:activator="{ on }">
                                                <v-btn icon small @click="editClient(item)" v-on="on" color="primary">
                                                    <v-icon small>mdi-pencil</v-icon>
                                                </v-btn>
                                            </template>
                                            <span>Редактировать</span>
                                        </v-tooltip>

                                        <v-tooltip bottom>
                                            <template v-slot:activator="{ on }">
                                                <v-btn icon small @click="deleteClient(item)" v-on="on" color="error">
                                                    <v-icon small>mdi-delete</v-icon>
                                                </v-btn>
                                            </template>
                                            <span>Удалить</span>
                                        </v-tooltip>
                                    </template>
                                </v-data-table>
                            </v-card>
                        </div>

                        <!-- ========== СОТРУДНИКИ (CRUD) ========== -->
                        <div v-if="isAuthenticated && currentView === 'staff'">
                            <v-card>
                                <v-card-title>
                                    <v-icon left>mdi-account-tie</v-icon>
                                    Управление сотрудниками
                                    <v-spacer></v-spacer>
                                    <v-text-field
                                        v-model="staff.search"
                                        append-icon="mdi-magnify"
                                        label="Поиск сотрудников..."
                                        single-line
                                        hide-details
                                        outlined
                                        dense
                                        class="mr-4"
                                    ></v-text-field>
                                    <v-btn color="primary" @click="openStaffDialog()">
                                        <v-icon left>mdi-plus</v-icon>
                                        Добавить сотрудника
                                    </v-btn>
                                </v-card-title>

                                <v-data-table
                                    :headers="staff.headers"
                                    :items="staff.items"
                                    :search="staff.search"
                                    :loading="staff.loading"
                                    class="elevation-1"
                                >
                                    <template v-slot:item.is_active="{ item }">
                                        <v-chip :color="item.is_active ? 'success' : 'error'" dark small>
                                            [[ item.is_active ? 'Работает' : 'Уволен' ]]
                                        </v-chip>
                                    </template>

                                    <template v-slot:item.actions="{ item }">
                                        <v-tooltip bottom>
                                            <template v-slot:activator="{ on }">
                                                <v-btn icon small @click="editStaff(item)" v-on="on" color="primary">
                                                    <v-icon small>mdi-pencil</v-icon>
                                                </v-btn>

    <script>
        // Используем пользовательские разделители для Vue, чтобы избежать конфликта с Django
        Vue.config.delimiters = ['[[', ']]'];

        new Vue({
            el: '#app',
            delimiters: ['[[', ']]'],
            vuetify: new Vuetify({
                theme: {
                    themes: {
                        light: {
                            primary: '#1976D2',
                            secondary: '#424242',
                            accent: '#82B1FF',
                            error: '#FF5252',
                            info: '#2196F3',
                            success: '#4CAF50',
                            warning: '#FFC107'
                        }
                    }
                }
            }),
            data: () => ({
                // Состояние приложения
                loading: true,
                drawer: true,
                currentView: 'dashboard',
                isAuthenticated: false,
                token: localStorage.getItem('token') || null,

                // Пользователь
                user: {
                    email: '',
                    username: ''
                },

                // Статистика
                dashboardStats: [
                    { title: 'Всего номеров', value: 0, icon: 'mdi-bed', color: 'blue', description: 'Все номера' },
                    { title: 'Свободные номера', value: 0, icon: 'mdi-bed-empty', color: 'green', description: 'Доступно сейчас' },
                    { title: 'Клиенты', value: 0, icon: 'mdi-account-group', color: 'orange', description: 'Всего клиентов' },
                    { title: 'Сотрудники', value: 0, icon: 'mdi-account-tie', color: 'purple', description: 'Весь персонал' }
                ],

                // Последние клиенты
                recentClients: [],

                // Свободные номера
                availableRoomsCount: 0,
                availableRoomsList: [],

                // Формы
                loginForm: {
                    email: '',
                    password: '',
                    valid: false,
                    loading: false,
                    error: null
                },

                registerForm: {
                    email: '',
                    username: '',
                    password: '',
                    passwordConfirm: '',
                    valid: false,
                    loading: false,
                    error: null
                },

                profileForm: {
                    username: '',
                    currentPassword: '',
                    newPassword: '',
                    confirmPassword: '',
                    valid: false,
                    loading: false,
                    error: null,
                    success: null
                },

                // Модели данных
                rooms: {
                    search: '',
                    loading: false,
                    headers: [
                        { text: 'Номер', value: 'room_number' },
                        { text: 'Этаж', value: 'floor' },
                        { text: 'Тип', value: 'room_type_name' },
                        { text: 'Телефон', value: 'has_phone' },
                        { text: 'Статус', value: 'is_available' },
                        { text: 'Действия', value: 'actions', sortable: false }
                    ],
                    items: []
                },

                clients: {
                    search: '',
                    loading: false,
                    headers: [
                        { text: 'Паспорт', value: 'passport_number' },
                        { text: 'Фамилия', value: 'last_name' },
                        { text: 'Имя', value: 'first_name' },
                        { text: 'Отчество', value: 'middle_name' },
                        { text: 'Город', value: 'city' },
                        { text: 'Дата заселения', value: 'check_in_date' },
                        { text: 'Действия', value: 'actions', sortable: false }

                }

                // Инициализация приложения
                initApp() {
                    axios.defaults.baseURL = 'http://127.0.0.1:8000';

                    if (this.token) {

        this.services.items = response.data;
    } catch (error) {
        console.error('Ошибка загрузки услуг:', error);
        this.showSnackbar
            ? this.showSnackbar('Ошибка загрузки услуг', 'error')
            : alert('Ошибка загрузки услуг');
    } finally {

                // Проверка аутентификации
                async checkAuth() {
                    try {
                        const response = await axios.get('/auth/users/me/');
                        this.user = response.data;
                        this.isAuthenticated = true;
                        this.currentView = 'dashboard';
                        await this.loadDashboardData();
                        this.showSnackbar('Добро пожаловать!', 'success');
                    } catch (error) {
                        console.error('Ошибка аутентификации:', error);
                        this.logout();
                    }
                },

                // Вход в систему
                async login() {
                    this.loginForm.loading = true;
                    this.loginForm.error = null;

                    try {
                        const response = await axios.post('/auth/token/login/', {
                            email: this.loginForm.email,
                            password: this.loginForm.password
                        });

                        this.token = response.data.auth_token;
                        localStorage.setItem('token', this.token);
                        await this.checkAuth();
                        this.showSnackbar('Вход выполнен успешно', 'success');
                    } catch (error) {
                        console.error('Ошибка входа:', error);
                        this.loginForm.error = 'Ошибка входа. Проверьте email и пароль.';
                        this.showSnackbar('Ошибка входа', 'error');
                    } finally {
                        this.loginForm.loading = false;
                    }
                },

                // Регистрация
                async register() {
                    if (this.registerForm.password !== this.registerForm.passwordConfirm) {
                        this.registerForm.error = 'Пароли не совпадают';
                        return;
                    }

                    this.registerForm.loading = true;
                    this.registerForm.error = null;

                    try {
                        await axios.post('/auth/users/', {
                            email: this.registerForm.email,
                            username: this.registerForm.username,
                            password: this.registerForm.password
                        });

                        // Автоматический вход после регистрации
                        await this.login();
                        this.showSnackbar('Регистрация выполнена успешно', 'success');
                    } catch (error) {
                        console.error('Ошибка регистрации:', error);
                        this.registerForm.error = error.response?.data?.email?.[0] || 'Ошибка регистрации';
                        this.showSnackbar('Ошибка регистрации', 'error');
                    } finally {
                        this.registerForm.loading = false;
                    }
                },

                        await axios.put('/auth/users/me/', {
                            username: this.profileForm.username
                        });

                        // Смена пароля, если указан новый
                        if (this.profileForm.newPassword && this.profileForm.currentPassword) {
                            if (this.profileForm.newPassword !== this.profileForm.confirmPassword) {
                                throw new Error('Новые пароли не совпадают');

                            await axios.post('/auth/users/set_password/', {
                                current_password: this.profileForm.currentPassword,

                        this.profileForm.success = 'Профиль успешно обновлен';

                        await this.loadUserData();

                        this.showSnackbar('Выберите клиента', 'warning');
                        return;
                    }

                    try {
                        const response = await axios.get(
                            `/api/cleaning-schedule/cleaner_for_client_room/?client_id=${this.analytics.selectedClient.id}&day_of_week=${this.analytics.selectedDay}`
                        );

                        if (response.data.detail === 'Уборщик не найден') {
                            this.analytics.cleanerResult = 'Уборщик не найден для выбранного дня';
                        } else {
                            this.analytics.cleanerResult = `Уборщик: ${response.data.staff_name}, Этаж: ${response.data.floor}, День: ${response.data.day_of_week_display}`;
                        }
                    } catch (error) {
                        console.error('Ошибка поиска уборщика:', error);
                        this.showSnackbar('Ошибка поиска уборщика', 'error');
                    }
                },

                async getRoomHistory() {
                    if (!this.analytics.selectedRoom || this.analytics.dateRange.length !== 2) {
                        this.showSnackbar('Выберите номер и период', 'warning');
                        return;
                    }

                    try {
                        // Здесь должен быть вызов соответствующего endpoint
                        // Временная реализация
                        this.showSnackbar('Функция в разработке', 'info');
                    } catch (error) {
                        console.error('Ошибка получения истории номера:', error);
                        this.showSnackbar('Ошибка получения истории', 'error');
                    }
                },

                // Квартальный отчет
                async generateQuarterlyReport() {
                    this.quarterReport.loading = true;

                    try {
                        const response = await axios.get(
                            `/api/stays/quarterly_report/?year=${this.quarterReport.year}&quarter=${this.quarterReport.quarter}`
                        );

                        this.quarterReport.data = response.data;
                        this.showSnackbar('Отчет сформирован', 'success');
                    } catch (error) {
                        console.error('Ошибка формирования отчета:', error);
                        this.showSnackbar('Ошибка формирования отчета', 'error');
                    } finally {
                        this.quarterReport.loading = false;
                    }
                },

                // Вспомогательные методы
                formatDate(dateString) {
                    if (!dateString) return '';
                    const date = new Date(dateString);
                    return date.toLocaleDateString('ru-RU');
                },

                showSnackbar(text, color = 'success') {
                    this.snackbar.text = text;
                    this.snackbar.color = color;
                    this.snackbar.show = true;
                }
            }
        });
    </script>
