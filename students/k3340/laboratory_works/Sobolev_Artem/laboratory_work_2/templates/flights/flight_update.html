{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ flight.number }} - Редактирование рейса</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #1C2526;
            font-family: 'Roboto Mono', monospace;
            color: #FFD700;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .board-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background-color: #2D3E3F;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid #FFD700;
            margin-bottom: 1.5rem;
            border-radius: 5px;
        }

        .form-section {
            background-color: #2D3E3F;
            padding: 15px;
            margin-bottom: 1.5rem;
            border-radius: 5px;
        }

        .form-section label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-section input,
        .form-section select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            background-color: #3A4F50;
            border: none;
            border-radius: 4px;
            color: #FFD700;
            font-family: 'Roboto Mono', monospace;
        }

        .form-section input:focus,
        .form-section select:focus {
            outline: none;
            border: 1px solid #FFD700;
        }

        .submit-btn {
            background-color: #FFD700;
            color: #1C2526;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
        }

        .submit-btn:hover {
            background-color: #E6C200;
        }

        .ticker {
            background-color: #2D3E3F;
            padding: 10px;
            text-align: center;
            color: #FFD700;
            font-size: 14px;
            position: fixed;
            bottom: 0;
            width: 100%;
            border-top: 1px solid #FFD700;
        }

        @media (max-width: 768px) {
            .form-section {
                padding: 10px;
            }
            .form-section input,
            .form-section select {
                font-size: 0.9rem;
            }
            .submit-btn {
                width: 100%;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="board-container">
        <div class="header">
            <h1 class="text-2xl md:text-3xl">{{ flight.number }} - Редактирование рейса</h1>
        </div>
        <div class="form-section">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div>
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <span style="color: #FF4444;">{{ field.errors }}</span>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="submit-btn">Сохранить изменения</button>
            </form>
        </div>
    </div>
    <div class="ticker">
        Добро пожаловать в аэропорт! Редактируйте рейсы в админской панели.
    </div>
</body>
</html>
