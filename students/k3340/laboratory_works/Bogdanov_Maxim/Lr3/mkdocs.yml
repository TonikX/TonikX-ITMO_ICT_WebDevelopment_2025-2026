site_name: School Management Service
site_description: API для управления школьной системой
site_author: Bogdanov Maxim
repo_url: https://github.com/TonikX/ITMO_ICT_WebDevelopment_2025-2026
repo_name: GitHub

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Переключить на тёмную тему
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Переключить на светлую тему
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang: ru

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Главная: index.md
  - Быстрый старт: quick-start.md
  - API документация: api.md
  - Архитектура: architecture.md
  - База данных: database.md
  - Развертывание: deployment.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/TonikX/ITMO_ICT_WebDevelopment_2025-2026

