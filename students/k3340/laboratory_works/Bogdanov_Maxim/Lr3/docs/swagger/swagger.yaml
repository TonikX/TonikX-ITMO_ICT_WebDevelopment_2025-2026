            type: object
      security:
      - BearerAuth: []
      summary: Создать класс
      tags:
      - classes
  /classes/{id}:
    delete:
      consumes:
      - application/json
      description: Выполняет soft delete класса
      parameters:
      - description: ID класса
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Удалить класс
      tags:
      - classes
    get:
      consumes:
      - application/json
      description: Возвращает информацию о классе по его ID
      parameters:
      - description: ID класса
        in: path
        name: id
