components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT токен доступа. Получите токен через `/api/v1/auth/login` или `/api/v1/auth/register`

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Код ошибки
              example: NOT_FOUND
            message:
              type: string
              description: Сообщение об ошибке
              example: Teacher not found
            entity:
              type: string
              description: Сущность, связанная с ошибкой
              example: Teacher
            field:
              type: string
              description: Поле, связанное с ошибкой
              example: id
            value:
              type: string
              description: Значение, вызвавшее ошибку
              example: "999"
            reason:
              type: string
              description: Причина ошибки
              example: Resource does not exist
            additional:
              type: object
              description: Дополнительная информация об ошибке

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
          example: "2024-01-01T12:00:00Z"
        checks:
          type: object
          additionalProperties:
            type: object
            properties:
              status:
                type: string
                example: ok
              message:
                type: string
                example: Database connection successful

    RegisterRequest:
      type: object
      required:
        - username
        - password
        - role
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: Имя пользователя
          example: teacher1
        email:
          type: string
          format: email
          maxLength: 255
          description: Email адрес
          example: teacher1@school.com
        password:
          type: string
          minLength: 8
          description: Пароль (минимум 8 символов)
          example: SecurePass123!
        role:
          type: string
          enum: [admin, head_teacher, teacher]
          description: Роль пользователя
          example: teacher
        teacher_id:
          type: integer
          description: ID учителя (если роль - teacher)
          example: 1

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Имя пользователя
          example: teacher1
        password:
          type: string
          description: Пароль
          example: SecurePass123!

    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: Refresh токен
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access токен
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refresh_token:
          type: string
          description: JWT refresh токен
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: '#/components/schemas/UserResponse'

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: teacher1
        email:
          type: string
          nullable: true
          example: teacher1@school.com
        role:
          type: string
          example: teacher
        teacher_id:
          type: integer
          nullable: true
          example: 1
        is_active:
          type: boolean
          example: true

    CreateTeacherRequest:
      type: object
      required:
        - first_name
        - last_name
      properties:
        first_name:
          type: string
          maxLength: 50
          description: Имя
          example: Иван
        last_name:
          type: string
          maxLength: 50
          description: Фамилия
          example: Петров
        middle_name:
          type: string
          maxLength: 50
          nullable: true
          description: Отчество
          example: Сергеевич
        classroom_id:
          type: integer
          nullable: true
          description: ID закрепленного кабинета
          example: 1

    UpdateTeacherRequest:
      type: object
      properties:
        first_name:
          type: string
          maxLength: 50
          example: Иван
        last_name:
          type: string
          maxLength: 50
          example: Петров
        middle_name:
          type: string
          maxLength: 50
          nullable: true
          example: Сергеевич
        classroom_id:
          type: integer
          nullable: true
          example: 1

    TeacherResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        first_name:
          type: string
          example: Иван
        last_name:
          type: string
          example: Петров
        middle_name:
          type: string
          nullable: true
          example: Сергеевич
        classroom_id:
          type: integer
          nullable: true
          example: 1
        created_at:
          type: string
          format: date-time
          example: "2024-01-01T12:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-01-01T12:00:00Z"

    CreateStudentRequest:
      type: object
      required:
        - first_name
        - last_name
        - gender_id
        - class_id
      properties:
        first_name:
          type: string
          maxLength: 50
          description: Имя
          example: Петр
        last_name:
          type: string
          maxLength: 50
          description: Фамилия
          example: Иванов
        middle_name:
          type: string
          maxLength: 50
          nullable: true
          description: Отчество
          example: Александрович
        gender_id:
          type: integer
          description: ID пола
          example: 1
        class_id:
          type: integer
          description: ID класса
          example: 1

    UpdateStudentRequest:
      type: object
      properties:
        first_name:
          type: string
          maxLength: 50
          example: Петр
        last_name:
          type: string
          maxLength: 50
          example: Иванов
        middle_name:
          type: string
          maxLength: 50
          nullable: true
          example: Александрович
        gender_id:
          type: integer
          example: 1
        class_id:
          type: integer
          example: 1

    StudentResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        first_name:
          type: string
