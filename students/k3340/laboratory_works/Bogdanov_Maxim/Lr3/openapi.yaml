openapi: 3.0.3
info:
  title: School Management Service API
  description: |
    REST API для управления школьной системой. 
    Предоставляет функционал для управления учителями, учениками, классами, расписанием, оценками и отчетностью.
    
    ## Аутентификация
    API использует JWT токены для аутентификации. Для получения токенов необходимо:
    1. Зарегистрироваться через `/api/v1/auth/register`
    2. Войти через `/api/v1/auth/login`
    3. Использовать полученный `access_token` в заголовке `Authorization: Bearer <token>`
    
    ## Роли пользователей
    - `admin` - администратор системы
    - `head_teacher` - завуч
    - `teacher` - учитель
    
    ## Ошибки
    Все ошибки возвращаются в формате:
    ```json
    {
      "error": {
        "code": "ERROR_CODE",
        "message": "Описание ошибки",
        "entity": "EntityName",
        "field": "field_name",
        "value": "invalid_value"
      }
    }
    ```
  version: 1.0.0
  contact:
    name: API Support
    email: support@school-service.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/

servers:
  - url: http://localhost:8080
    description: Локальный сервер разработки
  - url: https://api.school-service.com
    description: Production сервер

tags:
  - name: auth
    description: Аутентификация и авторизация
  - name: teachers
    description: Управление учителями
  - name: students
    description: Управление учениками
  - name: classes
    description: Управление классами
  - name: schedules
    description: Управление расписанием
  - name: grades
    description: Управление оценками
  - name: info
    description: Информационные запросы
  - name: reports
    description: Отчеты
  - name: health
    description: Проверка здоровья сервиса

paths:
  /health:
    get:
      tags:
        - health
      summary: Полная проверка здоровья
      description: Возвращает статус всех компонентов системы
      responses:
        '200':
          description: Сервис работает
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Сервис недоступен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /health/ready:
    get:
      tags:
        - health
      summary: Проверка готовности
      description: Проверяет готовность сервиса к обработке запросов
      responses:
        '200':
          description: Сервис готов
        '503':
          description: Сервис не готов

  /health/live:
    get:
      tags:
        - health
      summary: Проверка жизнеспособности
      description: Проверяет, что сервис работает
      responses:
        '200':
          description: Сервис жив

  /api/v1/auth/register:
    post:
      tags:
        - auth
      summary: Регистрация нового пользователя
      description: Регистрирует нового пользователя в системе
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              username: teacher1
              email: teacher1@school.com
              password: SecurePass123!
              role: teacher
              teacher_id: 1
      responses:
        '201':
          description: Пользователь успешно зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Пользователь уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      tags:
        - auth
      summary: Вход пользователя
      description: Выполняет аутентификацию пользователя и возвращает токены
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: teacher1
              password: SecurePass123!
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Неверные учетные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/refresh:
    post:
      tags:
        - auth
      summary: Обновление access токена
      description: Обновляет access токен используя refresh токен
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
            example:
              refresh_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Токен успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Неверный или истекший refresh токен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      tags:
        - auth
      summary: Выход пользователя
      description: Отзывает refresh токен пользователя
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Успешный выход
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logout successful
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Неавторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

