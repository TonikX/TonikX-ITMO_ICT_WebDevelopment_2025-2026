site_name: Лабораторные работы - Веб-разработка

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Переключить на тёмную тему
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Переключить на светлую тему
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

nav:
  - Главная: index.md
  - Лабораторная работа 2:
    - Введение: index.md
    - Задание: task.md
    - Архитектура: architecture.md
    - Модели данных: models.md
    - Бизнес-логика: business-logic.md
    - Представления и шаблоны: views.md
    - Тестирование: testing.md
    - Инструкция по запуску: installation.md
    - Выводы: conclusion.md