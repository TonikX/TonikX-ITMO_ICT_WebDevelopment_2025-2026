site_name: Проект Warriors - Task 2
site_description: Документация по проекту Warriors - система управления воинами
site_author: Губанов Егор
site_url: https://egorr-gubanov.github.io/TonikX-ITMO_ICT_WebDevelopment_2025-2026/Lr3/Task2/

repo_name: egorr-gubanov/TonikX-ITMO_ICT_WebDevelopment_2025-2026
repo_url: https://github.com/egorr-gubanov/TonikX-ITMO_ICT_WebDevelopment_2025-2026
copyright: Copyright &copy; 2024 Губанов Егор

theme:
  name: material
  palette:
    primary: blue
    accent: light blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - codehilite:
      anchor_linenums: true
      line_numbers: true
  - pymdownx.tabbed
  - tables
  - toc:
      permalink: true

# GitHub Pages configuration
use_directory_urls: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/egorr-gubanov

nav:
  - Главная: index.md

