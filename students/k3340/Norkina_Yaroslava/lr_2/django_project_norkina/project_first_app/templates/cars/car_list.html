<h1>Автомобили</h1>
<ul>
{% for car in cars %}
  <li>
    <a href="{% url 'car_detail' car.pk %}">{{ car }}</a>
    | <a href="{% url 'car_update' car.pk %}">Изменить</a>
    | <a href="{% url 'car_delete' car.pk %}">Удалить</a>
  </li>
{% empty %}
  <li>Нет автомобилей</li>
{% endfor %}
</ul>
<a href="{% url 'car_create' %}">Добавить автомобиль</a>
