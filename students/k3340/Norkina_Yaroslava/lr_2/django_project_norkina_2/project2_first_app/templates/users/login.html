<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .error { color: red; font-size: 0.9em; }
        .links { margin-top: 15px; }
        .links a { color: #007bff; text-decoration: none; margin-right: 15px; }
    </style>
</head>
{% extends 'base.html' %}
{% block content %}
<body>
    <h2>Вход в аккаунт</h2>

    {% if form.errors %}
        <p class="error">Неверное имя пользователя или пароль.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="{{ form.username.id_for_label }}">Логин:</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label for="{{ form.password.id_for_label }}">Пароль:</label>
            {{ form.password }}
        </div>
        <button type="submit">Войти</button>
    </form>

    <div class="links">
        <a href="{% url 'register' %}">Регистрация</a>
        <a href="{% url 'trip_list_last_month' %}">Главная</a>
    </div>
</body>
{% endblock %}
</html>
