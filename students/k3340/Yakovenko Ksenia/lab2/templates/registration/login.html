{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<h1 class="h3 mb-3">Вход</h1>
<form method="post" class="mt-3" style="max-width: 420px;">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-primary">Войти</button>
</form>
<p class="mt-3">Нет аккаунта? <a href="{% url 'signup' %}">Регистрация</a></p>
{% endblock %}
