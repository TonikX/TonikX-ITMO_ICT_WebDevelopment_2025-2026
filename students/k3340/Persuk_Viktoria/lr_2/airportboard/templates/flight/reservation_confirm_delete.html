{% extends "flight/base.html" %}

{% block title %}Удалить бронирование{% endblock %}

{% block content %}
<h3>Удалить бронирование рейса {{ reservation.flight.flight_number }}?</h3>

<form method="post">
    {% csrf_token %}
    <a href="{% url 'my_reservations' %}" class="btn btn-secondary">Отмена</a>
    <button type="submit" class="btn btn-danger">Удалить</button>
  </form>
{% endblock %}
