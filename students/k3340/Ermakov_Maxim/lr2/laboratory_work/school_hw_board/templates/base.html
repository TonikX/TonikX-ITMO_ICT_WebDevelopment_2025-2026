<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Доска домашних заданий</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap (стили) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!--
    ❗ Именно сюда вставляем свой CSS: внутри <head>, после Bootstrap.
    Это гарантирует, что наши правила переразовят (переопределят) дефолтные из Bootstrap.
  -->
  <style>
    /* Базовая типографика и фон */
    body { background: #f6f7fb; }
    .navbar-brand { font-weight: 600; letter-spacing: .2px; }

    /* Центрирование карточек авторизации/регистрации */
    .auth-wrap { min-height: calc(100vh - 120px); } /* примерно на высоту навбара */
    .auth-card { width: 100%; max-width: 420px; border-radius: 16px; }

    /* Немного аккуратности для форм */
    .form-label { font-weight: 500; }
    .card-title { margin-bottom: .25rem; }
    .card-subtitle { font-size: .9rem; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{% url 'homework_list' %}">HW Board</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div id="nav" class="collapse navbar-collapse">

      <!-- Поиск по ДЗ -->
      <form class="d-flex ms-auto" method="get" action="{% url 'homework_list' %}">
        <input name="q" class="form-control me-2" type="search"
               placeholder="Поиск по предмету/тексту" value="{{ request.GET.q }}">
        <button class="btn btn-outline-light">Искать</button>
      </form>

      <!-- Навигация справа -->
      <ul class="navbar-nav ms-3">
        {% if user.is_authenticated %}
          {% if user.is_staff or user.role == 'teacher' %}
            <li class="nav-item"><a class="nav-link" href="{% url 'homework_create' %}">Новое задание</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'gradebook' %}">Оценки класса</a></li>
          {% endif %}
          <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Выйти</a></li>
        {% else %}
          <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Войти</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'signup' %}">Регистрация</a></li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

<!-- Bootstrap (скрипты) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
