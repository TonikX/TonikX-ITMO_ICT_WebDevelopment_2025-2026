{% extends 'base.html' %}
{% block title %}Удалить отзыв{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h1 class="card-title">Удалить отзыв</h1>
    <p>Вы действительно хотите удалить отзыв на рейс:</p>
    <p><strong>{{ review.flight.flight_number }}</strong></p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Подтвердить удаление</button>
        <a href="{% url 'my_reviews' %}" class="btn btn-secondary">Назад</a>
    </form>
</div>
{% endblock %}
