<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Список машин</title>
</head>
<body>
<h1>Список машин</h1>
<ul>
  {% for car in object_list %}
    <li>
      <a href="{% url 'car-detail' car.pk %}">
        {{ car.brand }} {{ car.model }} ({{ car.state_number }})
      </a>
    </li>
  {% endfor %}
</ul>
</body>
</html>
