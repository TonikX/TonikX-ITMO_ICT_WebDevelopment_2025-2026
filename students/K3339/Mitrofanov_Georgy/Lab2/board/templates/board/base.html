<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Доска домашних заданий{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'homework_list' %}">
            Homework Board
        </a>

        <div class="navbar-nav me-auto">
          <a class="nav-link" href="{% url 'homework_list' %}">Домашние задания</a>

          {% if user.is_authenticated %}
            <a class="nav-link" href="{% url 'my_grades' %}">Мои оценки</a>
          {% endif %}

          {% if user.is_staff or user.is_superuser %}
            <a class="nav-link" href="{% url 'class_grades_table' %}">Оценки класса</a>
          {% endif %}
        </div>

        <div class="ms-auto">
            {% if user.is_authenticated %}
                <span class="text-white me-3">{{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn-light btn-sm">Выйти</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-light btn-sm me-2">Вход</a>
                <a href="{% url 'register' %}" class="btn btn-outline-light btn-sm">Регистрация</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
