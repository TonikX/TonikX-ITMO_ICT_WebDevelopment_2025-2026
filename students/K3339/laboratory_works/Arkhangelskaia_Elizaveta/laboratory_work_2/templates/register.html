{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" type="text/css" href="{% static 'hotels/css/main.css' %}">
    <style>
        
    </style>
</head>
<body>
    <div class="container">
        <h1>Регистрация</h1>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="field">
                    {{ field.label_tag }} <br>
                    {{ field }} 
                    {% if field.errors %}
                        <div style="color:red;">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit">Зарегистрироваться</button>
        </form>
    </div>
</body>
</html>
