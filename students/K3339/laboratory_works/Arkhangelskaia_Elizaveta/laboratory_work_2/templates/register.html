<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        body {
            font-family: sans-serif;
            background: #fff7e6;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 400px;
            margin: 50px auto;
            background: #fdf6f9;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #000000; 
        }
        form {
            display: flex;
            flex-direction: column;
        }
        .field {
            margin-bottom: 15px; 
        }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ffc8c8;
            font-size: 1em;
            box-sizing: border-box;
        }
        button {
            border: 2px solid #ffb6c1; 
            background-color: #ffb6c1;
            border-radius: 8px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1em;
            transition: 0.3s;
            margin-top: 15px;
        }
        button:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Регистрация</h1>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="field">
                    {{ field.label_tag }} <br>
                    {{ field }} 
                    {% if field.errors %}
                        <div style="color:red;">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit">Зарегистрироваться</button>
        </form>
    </div>
</body>
</html>
