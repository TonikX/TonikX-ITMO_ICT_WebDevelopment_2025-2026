{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Отели</title>
    <link rel="stylesheet" type="text/css" href="{% static 'hotels/css/main.css' %}">
</head>
<body>
<h1> Отели </h1>
    {% for item in hotels_with_rating %}
        <a href="{% url 'all_rooms'%}?id={{ item.hotel.pk }}">
            <div class="hotel-card">
                <strong>{{ item.hotel.name }}</strong><br>
                {{ item.hotel.address }}<br>
                <strong>Оценка отеля: </strong>{{ item.rating }}/10
            </div>
        </a>
    {% endfor %}
</body>
</html>
