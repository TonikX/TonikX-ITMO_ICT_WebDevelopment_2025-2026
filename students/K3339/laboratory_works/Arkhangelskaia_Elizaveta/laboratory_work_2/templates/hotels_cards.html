{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Отели</title>
    <link rel="stylesheet" type="text/css" href="{% static 'hotels/css/main.css' %}">
</head>
<body>
<h1> Отели </h1>
    {% for hotel in hotels %}
        <a href="{% url 'all_rooms'%}?id={{ hotel.pk }}">
            <div class="hotel">
                <strong>{{ hotel.name }}</strong><br>
                {{ hotel.address }}
            </div>
        </a>
    {% endfor %}
</body>
</html>
