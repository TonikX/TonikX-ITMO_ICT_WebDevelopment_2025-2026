{% extends 'racing/base.html' %}
{% block title %}Регистрация на {{ race.name }}{% endblock %}
{% block content %}
  <a href="{% url 'racing:races_list' %}">Вернуться к списку гонок</a>
  <h2>Регистрация на гонку: {{ race.name }}</h2>
  <form method="post" action="">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Зарегистрироваться</button>
  </form>
{% endblock %}
