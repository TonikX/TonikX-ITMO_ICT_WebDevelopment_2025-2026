{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Регистрация - Доска домашних заданий{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-user-plus"></i> Регистрация</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-user-plus"></i> Зарегистрироваться
                        </button>
                    </div>
                </form>
                <hr>
                <p class="text-center">
                    Уже есть аккаунт? 
                    <a href="{% url 'login' %}" class="text-decoration-none">Войдите здесь</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
