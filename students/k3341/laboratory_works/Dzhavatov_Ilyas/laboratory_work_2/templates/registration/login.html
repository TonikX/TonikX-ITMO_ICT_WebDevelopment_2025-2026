{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Вход - Доска домашних заданий{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> Вход в систему</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-sign-in-alt"></i> Войти
                        </button>
                    </div>
                </form>
                <hr>
                <p class="text-center">
                    Нет аккаунта? 
                    <a href="{% url 'register' %}" class="text-decoration-none">Зарегистрируйтесь здесь</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
