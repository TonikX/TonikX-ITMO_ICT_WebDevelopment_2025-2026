<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tour Form</title>
</head>
<body>
  <h2>{% if form.instance.pk %}Редактировать тур{% else %}Создать тур{% endif %}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Сохранить</button>
  </form>
  <a href="{% url 'tour_list' %}">Назад к списку туров</a>
</body>
</html>
