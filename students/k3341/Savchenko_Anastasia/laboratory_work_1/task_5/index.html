<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Журнал оценок</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            width: 100%;
            padding: 20px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1, h2 {
            text-align: center;
        }
        table {
            border-collapse: collapse;
            margin: 20px auto;
            width: 100%;
            max-width: 600px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        form {
            margin: 20px 0;
            text-align: center;
        }
        input, button {
            padding: 5px;
            margin: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Журнал оценок</h1>

        <form action="/add" method="POST">
            <input type="text" name="discipline" placeholder="Дисциплина" required>
            <input type="number" name="grade" placeholder="Оценка (1-5)" min="1" max="5" required>
            <button type="submit">Добавить</button>
        </form>

        <h2>Оценки:</h2>

        <!--GRADES_TABLE-->
    </div>
</body>
</html>
