services:
  db:
    container_name: db
    image: postgres:15
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: "airlines"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - postgresql_data:/var/lib/postgresql/15/data
  vue:
    build:
      context: ./airline_client
    container_name: vue
    ports:
      - 5173:5173
    volumes:
      - ./airline_client:/app
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

volumes:
  postgresql_data:
  node_modules:
