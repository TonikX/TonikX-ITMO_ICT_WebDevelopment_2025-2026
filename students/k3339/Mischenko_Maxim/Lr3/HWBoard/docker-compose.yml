services:
  db:
    container_name: postgres_db
    image: postgres:16
    environment:
      POSTGRES_DB: hwboard_db
      POSTGRES_USER: hwboard_user
      POSTGRES_PASSWORD: q
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

