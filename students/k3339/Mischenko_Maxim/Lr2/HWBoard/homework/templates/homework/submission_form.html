{% extends "homework/base.html" %}
{% block content %}
<h3>Сдача задания: {{ assignment.title }}</h3>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-success" type="submit">Отправить</button>
  <a class="btn btn-secondary" href="{% url 'homework:assignment_detail' assignment.pk %}">Назад</a>
</form>
{% endblock %}
