<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Доска домашних заданий</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <a class="navbar-brand" href="{% url 'homework:assignment_list' %}">HWBoard</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarsMain" aria-controls="navbarsMain" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarsMain">
    <ul class="navbar-nav mr-auto">
      <li class="nav-item"><a class="nav-link" href="{% url 'homework:assignment_list' %}">Задания</a></li>
      <li class="nav-item"><a class="nav-link" href="{% url 'homework:grades_table' %}">Таблица оценок</a></li>
    </ul>

    <form class="form-inline my-2 my-lg-0" method="get" action="{% url 'homework:assignment_list' %}">
      <input class="form-control mr-sm-2" type="search" placeholder="Поиск" aria-label="Search" name="q" value="{{ q|default:'' }}">
      <button class="btn btn-outline-light my-2 my-sm-0" type="submit">Поиск</button>
    </form>

    <ul class="navbar-nav ml-3">
      {% if user.is_authenticated %}
        <li class="nav-item"><a class="nav-link" href="#">Привет, {{ user.username }}</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'homework:logout' %}">Выйти</a></li>
      {% else %}
        <li class="nav-item"><a class="nav-link" href="{% url 'homework:login' %}">Войти</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'homework:register' %}">Регистрация</a></li>
      {% endif %}
    </ul>
  </div>
</nav>

<div class="container mt-4">
  {% if messages %}
    {% for m in messages %}
      <div class="alert alert-{{ m.tags }}">{{ m }}</div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
