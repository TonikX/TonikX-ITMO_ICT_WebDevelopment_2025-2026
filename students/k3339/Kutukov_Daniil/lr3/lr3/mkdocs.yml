site_name: College Management System API
theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight

nav:
  - Главная: index.md
  - API:
      - Аутентификация: api/auth.md
      - Кабинеты: api/classrooms.md
      - Дисциплины: api/subjects.md
      - Преподаватели: api/teachers.md
      - Группы: api/groups.md
      - Студенты: api/students.md
      - Оценки: api/grades.md
      - Расписание: api/schedule.md

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details
  - toc:
      permalink: true
