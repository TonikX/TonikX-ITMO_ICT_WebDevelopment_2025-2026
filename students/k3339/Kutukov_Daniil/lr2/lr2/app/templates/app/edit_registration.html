{% extends 'app/base.html' %}

{% block title %}Редактирование регистрации{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h3 class="mb-0"><i class="bi bi-pencil"></i> Редактирование регистрации</h3>
            </div>
            <div class="card-body">
                <h5>{{ registration.conference.title }}</h5>
                <p class="text-muted">
                    <i class="bi bi-calendar"></i> Дата регистрации: {{ registration.registration_date|date:"d.m.Y" }}
                </p>
                
                <hr>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-save"></i> Сохранить изменения
                        </button>
                        <a href="{% url 'conference_detail' registration.conference.id %}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
