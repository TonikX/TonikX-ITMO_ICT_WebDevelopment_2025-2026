site_name: Лабораторная работа №2 - Доска домашних заданий
site_description: Отчет по реализации web-сервиса средствами Django 3.2
site_author: Ваше Имя

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Главная: index.md
  - Описание проекта: 
    - Цели и задачи: project/objectives.md
    - Функциональные требования: project/requirements.md
  - Реализация:
    - Структура проекта: implementation/structure.md
    - Модели данных: implementation/models.md
    - Представления: implementation/views.md
    - Шаблоны: implementation/templates.md
  - Демонстрация:
    - Функционал: demo/functionality.md
    - Скриншоты: demo/screenshots.md
  - Заключение: conclusion.md