site_name: Lab 2 - Django Web Applications
site_description: Documentation for Lab 2 assignment - Django web development
site_author: Zoteev Maksim

theme:
  name: material
  language: ru

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - fenced_code
  - codehilite

docs_dir: docs

nav:
  - Home: index.md
  - Racing Application:
      - Overview: racing-app.md
  - Practical Tasks:
      - Task 1 - Models & Views: practical-task-1.md
      - Task 2 - Forms & CRUD: practical-task-2.md
      - Task 3 - Custom User Model: practical-task-3.md

