site_name: Labs 3 & 4
site_description: Documentation for Labs 3 & 4
site_author: Zoteev Maksim

theme:
  name: material
  language: ru

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - fenced_code
  - codehilite

docs_dir: docs

nav:
  - Home: index.md
  - Lab 3:
      - Overview: lab3/index.md
      - Practical Tasks:
          - Task 1: lab3/task1.md
          - Task 2: lab3/task2.md
          - Task 3: lab3/task3.md
  - Lab 4:
      - Overview: lab4/index.md
      - Practical Tasks:
          - Task 1 (Vue.js): lab4/task1.md
          - School System: lab4/task2.md
